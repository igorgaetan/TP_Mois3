- name: Installer k3s sans Traefik ni ServiceLB avec TLS SAN pour l'IP publique
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    INSTALL_K3S_EXEC="--tls-san {{ ansible_host }} --disable traefik --disable servicelb" sh -
  args:
    creates: /usr/local/bin/k3s

- name: Attendre que k3s soit prêt
  ansible.builtin.wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    state: present
    timeout: 60

- name: Récupérer le kubeconfig
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ./kubeconfig-k3s.yaml
    flat: true

- name: Remplacer 127.0.0.1 par l'IP publique dans le kubeconfig local
  delegate_to: localhost
  become: false
  ansible.builtin.replace:
    path: ./kubeconfig-k3s.yaml
    regexp: '127\.0\.0\.1'
    replace: "{{ ansible_host }}"

- name: Installer Helm
  ansible.builtin.shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Ajouter le repo ingress-nginx
  ansible.builtin.shell: |
    helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
    helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Installer nginx-ingress via Helm en HostNetwork
  kubernetes.core.helm:
    name: ingress-nginx
    chart_ref: ingress-nginx/ingress-nginx
    release_namespace: ingress-nginx
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    force: true
    values:
      controller:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        service:
          type: ClusterIP
        # On force le webhook d'admission à utiliser un port dynamique interne plutôt qu'un HostPort fixe
        admissionWebhooks:
          port: 8443
          runtimeClassName: ""